<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;1,9..144,700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/normalize.css">

  <title>Frontend Mentor | Product preview card component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <main>
    <div class="contenedor">
      <div class="card">
        <div class="img"></div>

        <div class="informacion">
          <h2 class="head">Perfume</h2>
          <h2 class="titulo pading">Gabrielle Essence Eau De Parfum
          </h2>
          <h2 class="descripcion pading">A floral, solar and voluptuous interpretation composed by Olivier Polge, 
          Perfumer-Creator for the House of CHANEL.</h2>

          <div class="precios pading">
            <p class="precio">$149.99</p>
            <p class="precio--anterior">$169.99</p>
          </div>
          
          <div class="pading">
            
            <a class="boton" href=""> <img class="svg" src="/images/icon-cart.svg" alt=""> Add to Cart</a>
          </div>
          
        </div>
    </divclas>
    </div>
  </main>


<div class="attribution">
